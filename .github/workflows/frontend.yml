name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy frontend to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.FRONTEND_HOST }}
          username: ubuntu
          key: ${{ secrets.FRONTEND_SSH_KEY }}
          script: |
            echo "Starting frontend deploy"

            cd ~
            if [ ! -d "-KUREMEDI-LUCENT-Project" ]; then
              git clone https://github.com/ankurkushwaha809/-KUREMEDI-LUCENT-Project.git
            fi

            cd -KUREMEDI-LUCENT-Project
            git fetch origin
            git reset --hard origin/main

            echo "Deploy website"
            cd Frontend/website
            rm -rf .next
            npm install
            npm run build
            pm2 delete website || true
            pm2 start npm --name website -- start

            echo "Deploy admin"
            cd ../admin
            rm -rf dist
            pnpm install
            pnpm build
            pm2 delete admin || true
            pm2 start "npx serve -s dist -l 3001" --name admin

            pm2 save
            pm2 list
