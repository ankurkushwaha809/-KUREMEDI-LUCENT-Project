name: frontend cicd

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy frontend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.FRONTEND_HOST }}
          username: ubuntu
          key: ${{ secrets.FRONTEND_SSH_KEY }}
          script: |
            cd ~/-KUREMEDI-LUCENT-Project
            git pull

            echo "Admin build"
            cd Frontend/admin
            npm install
            npm run build
            pm2 restart admin

            echo "Website build"
            cd ../website
            npm install
            npm run build
            pm2 restart website

            pm2 save
