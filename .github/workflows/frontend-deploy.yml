name: Deploy Frontend to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Deploy frontend
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_FRONTEND_HOST }}
          username: ${{ secrets.EC2_FRONTEND_USER }}
          key: ${{ secrets.EC2_FRONTEND_KEY }}
          script: |
            cd -- /home/ubuntu/-KUREMEDI-LUCENT-Project
            git pull origin main

            echo "Building admin..."
            cd Frontend/admin
            npm install
            npm run build
            sudo rm -rf /var/www/admin/*
            sudo cp -r dist/* /var/www/admin/

            echo "Building website..."
            cd ../website
            pm2 delete website || true
            rm -rf .next
            npm ci
            npm run build

            test -f .next/BUILD_ID
            test -f .next/prerender-manifest.json

            pm2 start npm --name "website" --cwd /home/ubuntu/-KUREMEDI-LUCENT-Project/Frontend/website -- start
            pm2 save

            sudo systemctl restart nginx
