name: Deploy Frontend (Next + Admin)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.FRONTEND_EC2_HOST }}
        username: ${{ secrets.FRONTEND_EC2_USER }}
        key: ${{ secrets.FRONTEND_EC2_KEY }}
        script: |
          set -e   # ❗ STOP if any error

          cd /home/ubuntu

          # Clone if not exists
          if [ ! -d "-KUREMEDI-LUCENT-Project" ]; then
            git clone https://github.com/ankurkushwaha809/-KUREMEDI-LUCENT-Project.git
          fi

          cd -KUREMEDI-LUCENT-Project

          echo "🔥 Resetting repo..."
          git fetch origin
          git reset --hard origin/main
          git clean -fd

          echo "📦 Latest commit:"
          git log -1

          # ---------------- WEBSITE ----------------
          echo "🚀 Deploying Website..."
          cd Frontend/website

          rm -rf .next
          rm -rf node_modules

          npm install
          npm run build

          pm2 delete website || true
          pm2 start npm --name website -- start

          # ---------------- ADMIN ----------------
          echo "🚀 Deploying Admin..."
          cd ../admin

          rm -rf dist
          rm -rf node_modules

          npm install
          npm run build

          pm2 delete admin || true
          pm2 start serve --name admin -- -s dist -l 5173

          pm2 save

          echo "✅ Deployment Done"
