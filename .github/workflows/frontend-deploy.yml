name: Deploy Frontend to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Deploy frontend
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_FRONTEND_HOST }}
          username: ${{ secrets.EC2_FRONTEND_USER }}
          key: ${{ secrets.EC2_FRONTEND_KEY }}
          script: |
            cd /home/ubuntu/-KUREMEDI-LUCENT-Project
            git fetch origin main
            git reset --hard origin/main

            echo "Building admin..."
            cd Frontend/admin
            npm install
            npm run build
            pm2 delete admin || true
            pm2 start "npm run preview -- --port 3001" --name admin

            echo "Building website..."
            cd ../website
            npm install
            npm run build

            pm2 delete website || true
            pm2 start npm --name website -- start

            pm2 save
            sudo systemctl restart nginx
