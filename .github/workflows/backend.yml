name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~
            if [ ! -d "-KUREMEDI-LUCENT-Project" ]; then
              git clone https://github.com/ankurkushwaha809/-KUREMEDI-LUCENT-Project.git
            fi

            cd -KUREMEDI-LUCENT-Project
            git pull origin main

            cd backend
            npm install

            pm2 restart kuremedi-backend || pm2 start index.js --name kuremedi-backend
            pm2 save
