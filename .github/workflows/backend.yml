name: Deploy Backend to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd -KUREMEDI-LUCENT-Project
            git pull origin main
            cd backend
            npm install
            pm2 restart kuremedi-backend || pm2 start index.js --name kuremedi-backend
            pm2 save
